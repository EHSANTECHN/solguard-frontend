<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>SolGuard AI</title>

  <style>

    body {

      margin: 0;

      background: #081120;

      font-family: Arial;

      color: white;

      display: flex;

      justify-content: center;

      align-items: center;

      height: 100vh;

    }

    .box {

      width: 90%;

      max-width: 700px;

      background: #101c35;

      padding: 40px;

      border-radius: 20px;

      text-align: center;

    }

    input {

      width: 70%;

      padding: 14px;

      border-radius: 10px;

      border: none;

      margin-top: 20px;

      outline: none;

    }

    button {

      padding: 14px 22px;

      border: none;

      border-radius: 10px;

      background: #00c853;

      color: white;

      cursor: pointer;

      margin-left: 10px;

    }

    #result {

      margin-top: 30px;

      background: #162544;

      padding: 20px;

      border-radius: 12px;

      text-align: left;

      min-height: 120px;

      line-height: 1.7;

    }

  </style>

</head>

<body>

  <div class="box">

    <h1>🚀 SolGuard AI</h1>

    <p>
      AI-powered Solana wallet scam detector
    </p>

    <input
      id="wallet"
      placeholder="Enter Solana wallet address"
    />

    <button onclick="checkWallet()">
      Check Risk
    </button>

    <div id="result">

      Waiting for analysis...

    </div>

  </div>

  <script>

    async function checkWallet() {

      const wallet =
        document.getElementById("wallet").value;

      const result =
        document.getElementById("result");

      result.innerHTML =
        "Analyzing wallet...";

      try {

        const response =
          await fetch(
            "https://solanaguard-ai-production.up.railway.app/check",
            {

              method: "POST",

              headers: {
                "Content-Type":
                  "application/json"
              },

              body:
                JSON.stringify({ wallet })

            }
          );

        const data =
          await response.json();

        result.innerHTML = `

          <h2>
            ${data.risk}
          </h2>

          <p>
            <strong>Wallet:</strong>
            ${data.wallet}
          </p>

          <p>
            <strong>Transactions:</strong>
            ${data.transactions}
          </p>

          <p>
            <strong>Risk Score:</strong>
            ${data.score}/100
          </p>

          <p>
            <strong>AI Analysis:</strong><br/>
            ${data.explanation}
          </p>

        `;

      } catch (err) {

        console.log(err);

        result.innerHTML =
          "Failed to analyze wallet";

      }

    }

  </script>

</body>

</html>
