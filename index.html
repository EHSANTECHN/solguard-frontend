<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>SolGuard AI</title>

  <style>

    * {

      margin: 0;
      padding: 0;
      box-sizing: border-box;

    }

    body {

      font-family:
        Inter,
        Arial,
        sans-serif;

      background:
        linear-gradient(
          135deg,
          #0b0f1f,
          #120d2e,
          #1b103f
        );

      min-height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;

      overflow: hidden;

      color: white;

      position: relative;

    }

    .blur1,
    .blur2 {

      position: absolute;

      border-radius: 50%;

      filter: blur(120px);

      opacity: 0.35;

    }

    .blur1 {

      width: 350px;
      height: 350px;

      background: #8b5cf6;

      top: -100px;
      left: -100px;

    }

    .blur2 {

      width: 400px;
      height: 400px;

      background: #14f195;

      bottom: -120px;
      right: -120px;

    }

    .container {

      position: relative;

      z-index: 1;

      width: 92%;
      max-width: 780px;

      padding: 45px;

      border-radius: 28px;

      background:
        rgba(20,20,35,0.7);

      backdrop-filter: blur(18px);

      border:
        1px solid rgba(255,255,255,0.08);

      box-shadow:
        0 0 60px rgba(0,0,0,0.45);

    }

    .topBar {

      display: flex;

      justify-content: space-between;

      align-items: center;

      margin-bottom: 30px;

    }

    .logo {

      font-size: 28px;

      font-weight: bold;

      letter-spacing: 1px;

    }

    .badge {

      background:
        rgba(139,92,246,0.18);

      color: #c4b5fd;

      padding: 10px 16px;

      border-radius: 999px;

      font-size: 13px;

      border:
        1px solid rgba(196,181,253,0.18);

    }

    h1 {

      font-size: 54px;

      line-height: 1.1;

      margin-bottom: 18px;

    }

    .gradient {

      background:
        linear-gradient(
          90deg,
          #14f195,
          #9945ff
        );

      -webkit-background-clip: text;

      -webkit-text-fill-color: transparent;

    }

    .desc {

      color: #b6bdd2;

      line-height: 1.8;

      margin-bottom: 35px;

      max-width: 620px;

    }

    .searchBox {

      display: flex;

      gap: 14px;

      margin-bottom: 28px;

    }

    input {

      flex: 1;

      padding: 18px;

      border-radius: 16px;

      border: none;

      outline: none;

      background:
        rgba(255,255,255,0.06);

      color: white;

      font-size: 15px;

      border:
        1px solid rgba(255,255,255,0.06);

    }

    input::placeholder {

      color: #7f86a5;

    }

    button {

      padding: 18px 24px;

      border-radius: 16px;

      border: none;

      cursor: pointer;

      font-weight: bold;

      font-size: 15px;

      color: white;

      background:
        linear-gradient(
          135deg,
          #14f195,
          #9945ff
        );

      transition: 0.3s;

    }

    button:hover {

      transform: translateY(-2px);

      box-shadow:
        0 10px 28px rgba(153,69,255,0.35);

    }

    #result {

      background:
        rgba(255,255,255,0.04);

      border:
        1px solid rgba(255,255,255,0.05);

      border-radius: 22px;

      padding: 28px;

      min-height: 220px;

      line-height: 1.9;

    }

    .safe {
      color: #14f195;
    }

    .warning {
      color: #ffd93d;
    }

    .danger {
      color: #ff4d6d;
    }

    .meter {

      width: 100%;

      height: 14px;

      background:
        rgba(255,255,255,0.08);

      border-radius: 999px;

      overflow: hidden;

      margin:
        18px 0 24px;

    }

    .meterFill {

      height: 100%;

      border-radius: 999px;

      transition: 0.5s;

    }

    .stats {

      display: grid;

      grid-template-columns:
        repeat(auto-fit,minmax(180px,1fr));

      gap: 16px;

      margin-top: 24px;

    }

    .card {

      padding: 18px;

      border-radius: 18px;

      background:
        rgba(255,255,255,0.04);

      border:
        1px solid rgba(255,255,255,0.05);

    }

    .cardTitle {

      color: #7f86a5;

      font-size: 13px;

      margin-bottom: 8px;

    }

    .cardValue {

      font-size: 22px;

      font-weight: bold;

    }

    .footer {

      margin-top: 24px;

      color: #6f7694;

      text-align: center;

      font-size: 13px;

    }

  </style>

</head>

<body>

  <div class="blur1"></div>
  <div class="blur2"></div>

  <div class="container">

    <div class="topBar">

      <div class="logo">
        🚀 SolGuard AI
      </div>

      <div class="badge">
        Phantom Inspired UI
      </div>

    </div>

    <h1>

      Protect Your
      <span class="gradient">
        Solana Wallet
      </span>

    </h1>

    <p class="desc">

      Analyze wallet activity using AI-powered blockchain intelligence.
      Detect suspicious transaction patterns before interacting with risky addresses.

    </p>

    <div class="searchBox">

      <input
        id="wallet"
        placeholder="Paste Solana wallet address..."
      />

      <button onclick="checkWallet()">
        Analyze
      </button>

    </div>

    <div id="result">

      Waiting for wallet analysis...

    </div>

    <div class="footer">

      Powered by Solana • Helius • AI Risk Engine

    </div>

  </div>

  <script>

    async function checkWallet() {

      const wallet =
        document.getElementById("wallet").value;

      const result =
        document.getElementById("result");

      if (!wallet) {

        result.innerHTML =
          "Please enter a wallet address.";

        return;

      }

      result.innerHTML =
        "⏳ Running blockchain analysis...";

      try {

        const response =
          await fetch(
            "https://solanaguard-ai-production.up.railway.app/check",
            {

              method: "POST",

              headers: {
                "Content-Type":
                  "application/json"
              },

              body:
                JSON.stringify({ wallet })

            }
          );

        const data =
          await response.json();

        let riskClass = "safe";
        let meterColor = "#14f195";

        if (data.risk === "Suspicious") {

          riskClass = "warning";
          meterColor = "#ffd93d";

        }

        if (data.risk === "High Risk") {

          riskClass = "danger";
          meterColor = "#ff4d6d";

        }

        result.innerHTML = `

          <h2 class="${riskClass}">
            ${data.risk}
          </h2>

          <div class="meter">

            <div
              class="meterFill"
              style="
                width:${data.score}%;
                background:${meterColor};
              "
            ></div>

          </div>

          <p>
            <strong>AI Analysis:</strong><br/>
            ${data.explanation}
          </p>

          <div class="stats">

            <div class="card">

              <div class="cardTitle">
                Transactions
              </div>

              <div class="cardValue">
                ${data.transactions}
              </div>

            </div>

            <div class="card">

              <div class="cardTitle">
                Risk Score
              </div>

              <div class="cardValue">
                ${data.score}/100
              </div>

            </div>

            <div class="card">

              <div class="cardTitle">
                Wallet
              </div>

              <div class="cardValue" style="font-size:14px;">
                ${data.wallet}
              </div>

            </div>

          </div>

        `;

      }

      catch (err) {

        console.log(err);

        result.innerHTML =
          "❌ Failed to analyze wallet.";

      }

    }

  </script>

</body>

</html>
