<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>SolGuard AI</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      font-family: Arial, sans-serif;

      background:
        radial-gradient(circle at top,
        #132347,
        #050b18);

      color: white;

      height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;

      overflow: hidden;

    }

    .glow {

      position: absolute;

      width: 500px;
      height: 500px;

      background:
        rgba(0,255,170,0.12);

      border-radius: 50%;

      filter: blur(120px);

      z-index: 0;

      animation:
        float 6s ease-in-out infinite;

    }

    .glow2 {

      right: -100px;
      bottom: -100px;

      background:
        rgba(0,140,255,0.12);

      animation-delay: 2s;

    }

    @keyframes float {

      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-20px);
      }

      100% {
        transform: translateY(0px);
      }

    }

    .card {

      position: relative;

      z-index: 1;

      width: 92%;
      max-width: 760px;

      padding: 40px;

      border-radius: 24px;

      background:
        rgba(16,28,53,0.85);

      backdrop-filter: blur(14px);

      border:
        1px solid rgba(255,255,255,0.08);

      box-shadow:
        0 0 40px rgba(0,0,0,0.4);

    }

    .badge {

      display: inline-block;

      padding: 8px 16px;

      background:
        rgba(0,255,170,0.12);

      color: #00e6a7;

      border-radius: 999px;

      font-size: 14px;

      margin-bottom: 20px;

      border:
        1px solid rgba(0,255,170,0.25);

    }

    h1 {

      font-size: 52px;

      margin-bottom: 14px;

      letter-spacing: 1px;

    }

    .sub {

      color: #b8c1d9;

      margin-bottom: 35px;

      line-height: 1.6;

    }

    .inputRow {

      display: flex;

      gap: 12px;

      margin-bottom: 25px;

    }

    input {

      flex: 1;

      padding: 16px;

      border: none;

      border-radius: 14px;

      background: #162544;

      color: white;

      outline: none;

      font-size: 16px;

    }

    input::placeholder {

      color: #7f8db0;

    }

    button {

      padding: 16px 24px;

      border: none;

      border-radius: 14px;

      background:
        linear-gradient(
          135deg,
          #00c853,
          #00e676
        );

      color: white;

      font-size: 16px;

      font-weight: bold;

      cursor: pointer;

      transition: 0.3s;

    }

    button:hover {

      transform: translateY(-2px);

      box-shadow:
        0 8px 24px rgba(0,230,118,0.35);

    }

    #result {

      margin-top: 20px;

      padding: 25px;

      border-radius: 18px;

      background:
        rgba(22,37,68,0.9);

      border:
        1px solid rgba(255,255,255,0.05);

      min-height: 180px;

      line-height: 1.8;

    }

    .safe {
      color: #00e676;
    }

    .warning {
      color: #ffd740;
    }

    .danger {
      color: #ff5252;
    }

    .meter {

      width: 100%;
      height: 12px;

      background: #0f172a;

      border-radius: 999px;

      overflow: hidden;

      margin: 18px 0;

    }

    .meterFill {

      height: 100%;

      border-radius: 999px;

      transition: width 0.5s ease;

    }

    .footer {

      margin-top: 25px;

      color: #6f7ea3;

      font-size: 13px;

      text-align: center;

    }

  </style>

</head>

<body>

  <div class="glow"></div>
  <div class="glow glow2"></div>

  <div class="card">

    <div class="badge">
      Web3 Security Intelligence
    </div>

    <h1>🚀 SolGuard AI</h1>

    <p class="sub">
      AI-powered Solana wallet scam detection platform.
      Analyze suspicious transaction behavior before interacting with risky wallets.
    </p>

    <div class="inputRow">

      <input
        id="wallet"
        placeholder="Enter Solana wallet address"
      />

      <button onclick="checkWallet()">
        Analyze
      </button>

    </div>

    <div id="result">

      Waiting for wallet analysis...

    </div>

    <div class="footer">
      Powered by Solana • Helius • AI Risk Engine
    </div>

  </div>

  <script>

    async function checkWallet() {

      const wallet =
        document.getElementById("wallet").value;

      const result =
        document.getElementById("result");

      if (!wallet) {

        result.innerHTML =
          "Please enter a wallet address.";

        return;

      }

      result.innerHTML =
        "⏳ Running blockchain analysis...";

      try {

        const response =
          await fetch(
            "https://solanaguard-ai-production.up.railway.app/check",
            {

              method: "POST",

              headers: {
                "Content-Type":
                  "application/json"
              },

              body:
                JSON.stringify({ wallet })

            }
          );

        const data =
          await response.json();

        let riskClass = "safe";
        let meterColor = "#00e676";

        if (data.risk === "Suspicious") {

          riskClass = "warning";
          meterColor = "#ffd740";

        }

        if (data.risk === "High Risk") {

          riskClass = "danger";
          meterColor = "#ff5252";

        }

        result.innerHTML = `

          <h2 class="${riskClass}">
            ${data.risk}
          </h2>

          <div class="meter">

            <div
              class="meterFill"
              style="
                width:${data.score}%;
                background:${meterColor};
              "
            ></div>

          </div>

          <p>
            <strong>Wallet:</strong><br/>
            ${data.wallet}
          </p>

          <p>
            <strong>Transactions:</strong>
            ${data.transactions}
          </p>

          <p>
            <strong>Risk Score:</strong>
            ${data.score}/100
          </p>

          <p>
            <strong>AI Analysis:</strong><br/>
            ${data.explanation}
          </p>

        `;

      }

      catch (err) {

        console.log(err);

        result.innerHTML =
          "❌ Failed to analyze wallet.";

      }

    }

  </script>

</body>

</html>
